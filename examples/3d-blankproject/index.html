<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>HTML/Canvas/3D Game Starter</title>
		<meta name="description" content="">
		<meta name="viewport" content="width=device-width, initial-scale=1">

		<link rel="stylesheet" href="css/game.css?">
		<link rel="stylesheet" href="../../css/hint.css">
		<link rel="stylesheet" href="../../css/font-awesome.min.css">

		<script src="../../lib/u-events.js"></script>
		<script src="../../lib/u-howler.js"></script>
		<script src="../../lib/u-macrobars.js"></script>
		<script src="../../lib/u-pathastar.js"></script>
		<script src="../../lib/u-threestage.js"></script>
		<script src="../../lib/u-helper.js"></script>

		<script src="js/game.js?"></script>
	</head>
	<body onunload="Game.quick_save();">

		<nav>
			HTML/Canvas/3D Game Starter
		</nav>

		<footer>
			<div id="frame-rate">0fps</div>
		</footer>

		<script type="module">
		import { THREE, EffectComposer, Shaders } from './js/pipeline.js';

		let stage = null;

			async function initStage() {
				stage = await ThreeStage.create({
					THREE : THREE,
					smoothScroll : 0.85,
					pan_speed : 0.03,
				});

			Game.init(stage, document.getElementById('frame-rate'));
			
			stage.start();

			const keyLight = new THREE.PointLight( 0xffffff, 4.0, 10.0 );
			keyLight.position.set( 5, 5, 5 );
			stage.root.add( keyLight );

			const fillLight = new THREE.PointLight( 0xff0000, 4.0, 10.0 );
			fillLight.position.set( -5, 5, 5 );
			stage.root.add( fillLight );

			const rimLight = new THREE.PointLight( 0x0000ff, 5.6, 10.0 );
			rimLight.position.set( 5, 3, 7 );
			stage.root.add( rimLight );

			const ambient = new THREE.HemisphereLight( 0x88ff88, 0x880088, 0.08 );
			stage.root.add( ambient );

			const geometry = new THREE.BoxGeometry( 10, 10, 10 );
			const material = new THREE.MeshStandardMaterial( {
				color: 0xcccccc,
				metalness: 0.1,
				roughness: 0.38
			} );
			const cube = new THREE.Mesh( geometry, material );
			stage.root.add( cube );

			stage.animate(function(dt) {
				cube.rotation.x += dt;
				cube.rotation.y += dt*2;
				return true;
			});

			setInterval(() => {
				document.getElementById('frame-rate').textContent = stage.debug.fps + ' FPS';
			}, 100);
		}

		window.addEventListener('load', () => {
			initStage().catch(console.error);
		});
		</script>

	</body>
</html>
